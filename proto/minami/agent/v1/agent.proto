syntax = "proto3";

package minami.agent.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/7k-group/minami/api/agent/v1/minami/agent/v1;agentv1";

service Agent {
  rpc Info(InfoRequest) returns (InfoResponse);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
  rpc PrepareShutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc GetPlayers(PlayersRequest) returns (PlayersResponse);
  rpc ExecuteAction(ExecuteActionRequest) returns (ExecuteActionResponse);
  rpc Console(stream ConsoleClientMessage) returns (stream ConsoleServerMessage);
}

message InfoRequest {}

message InfoResponse {
  string name = 1;
  string version = 2;
  repeated ActionSchema actions = 3;
  repeated MetricDescriptor metrics = 4;
}

message HealthRequest {}

message HealthResponse {
  bool ready = 1;
  string message = 2;
  map<string, string> details = 3;
}

message ShutdownRequest {
  int32 timeout_seconds = 1;
  string drain_reason = 2;
}

message ShutdownResponse {
  bool success = 1;
  string error = 2;
}

message PlayersRequest {}

message PlayersResponse {
  int32 online = 1;
  int32 capacity = 2;
  repeated Player players = 3;
}

message Player {
  string name = 1;
  string id = 2;
  google.protobuf.Timestamp joined_at = 3;
}

message ExecuteActionRequest {
  string action_name = 1;
  map<string, string> params = 2;
  string execution_id = 3;
}

message ExecuteActionResponse {
  ActionState state = 1;
  google.protobuf.Any result = 2;
  string error = 3;
}

message ConsoleClientMessage {
  oneof payload {
    ConsoleCommand command = 1;
    ConsolePing ping = 2;
  }
}

message ConsoleServerMessage {
  oneof payload {
    ConsoleLog log = 1;
    ConsoleResponse response = 2;
    ConsoleStatus status = 3;
    ConsoleError error = 4;
  }
}

message ActionSchema {
  string name = 1;
  string description = 2;
  map<string, ParamSchema> params = 3;
}

message ParamSchema {
  string type = 1;
  bool required = 2;
  string description = 3;
  string default = 4;
}

message MetricDescriptor {
  string name = 1;
  string description = 2;
  string unit = 3;
}

enum ActionState {
  ACTION_STATE_UNSPECIFIED = 0;
  ACTION_STATE_PENDING = 1;
  ACTION_STATE_RUNNING = 2;
  ACTION_STATE_SUCCEEDED = 3;
  ACTION_STATE_FAILED = 4;
  ACTION_STATE_TIMED_OUT = 5;
  ACTION_STATE_REJECTED = 6;
}

message ConsoleCommand {
  string rcon_command = 1;
}

message ConsolePing {
  string message = 1;
}

message ConsoleLog {
  string line = 1;
}

message ConsoleResponse {
  string response = 1;
}

message ConsoleStatus {
  string state = 1;
}

message ConsoleError {
  string message = 1;
}

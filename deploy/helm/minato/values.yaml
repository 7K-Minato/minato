# Default values for minato.

# Operator configuration
operator:
  enabled: true
  image:
    repository: harbor.7kgroup.com/minato/minato-operator
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  
  replicas: 2
  
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  leaderElection:
    enabled: true
  
  metrics:
    enabled: true
    port: 8080
    service:
      type: ClusterIP
      annotations: {}
  
  health:
    port: 8081

# Control Plane configuration
controlPlane:
  enabled: true
  image:
    repository: harbor.7kgroup.com/minato/minato-controlplane
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  
  replicas: 2
  
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: minato.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  
  serviceAccount:
    create: true
    name: ""
  
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# CRDs configuration
crds:
  enabled: true
  keep: true

# RBAC configuration
rbac:
  create: true

# Monitoring configuration
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
  prometheusRule:
    enabled: false
    labels: {}

# Webhook configuration
webhook:
  enabled: false
  certManager:
    enabled: false
    issuerRef: {}

# Security configuration
security:
  podSecurityStandards:
    enforce: restricted
    audit: restricted
    warn: restricted
  
  networkPolicy:
    enabled: true
    ingress: []
    egress:
      - to: []
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 6443

# Global configuration
global:
  imageRegistry: ""
  imagePullSecrets: []
  
# Testing
tests:
  enabled: true

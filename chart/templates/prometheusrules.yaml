{{- if and .Values.grafana.enabled .Values.grafana.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "minato.fullname" . }}-alerts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minato.labels" . | nindent 4 }}
    {{- with .Values.grafana.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
  - name: minato.rules
    rules:
    - alert: MinatoAgentUnreachable
      expr: |
        increase(minato_agent_unreachable_total[5m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Minato agent unreachable"
        description: "Agent for server {{ "{{" }} $labels.server {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }} has been unreachable for more than 5 minutes."
    
    - alert: MinatoGameServerStuckProvisioning
      expr: |
        minato_gameservers{state="Provisioning"} == 1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "GameServer stuck in Provisioning"
        description: "GameServer {{ "{{" }} $labels.server {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }} has been stuck in Provisioning state for more than 10 minutes."
    
    - alert: MinatoHighPlayerCount
      expr: |
        minato_players_online / minato_player_capacity > 0.9
      for: 5m
      labels:
        severity: info
      annotations:
        summary: "GameServer near capacity"
        description: "GameServer {{ "{{" }} $labels.server {{ "}}" }} is at {{ "{{" }} $value | humanizePercentage {{ "}}" }} capacity."
    
    - alert: MinatoActionExecutionFailed
      expr: |
        rate(minato_action_executions_total{result="Failed"}[5m]) > 0
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "Action execution failing"
        description: "Action {{ "{{" }} $labels.action {{ "}}" }} is failing on profile {{ "{{" }} $labels.profile {{ "}}" }}."
{{- end }}

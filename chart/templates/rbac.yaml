{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "minato.fullname" . }}-manager-role
  labels:
    {{- include "minato.labels" . | nindent 4 }}
rules:
  - apiGroups: ["operator.minato.io"]
    resources: ["gameprofiles"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["operator.minato.io"]
    resources: ["gameservers", "gameserverfleets", "actionexecutions", "gamesnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["operator.minato.io"]
    resources: ["gameservers/status", "gameserverfleets/status", "actionexecutions/status", "gamesnapshots/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["operator.minato.io"]
    resources: ["gameservers/finalizers", "gameserverfleets/finalizers", "actionexecutions/finalizers", "gamesnapshots/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "minato.fullname" . }}-manager-rolebinding
  labels:
    {{- include "minato.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "minato.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "minato.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

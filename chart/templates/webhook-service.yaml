{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minato.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minato.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: 9443
      protocol: TCP
      name: https
  selector:
    {{- include "minato.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: operator
{{- end }}

{{- if and .Values.controlPlane.enabled .Values.controlPlane.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "minato.fullname" . }}-controlplane
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minato.labels" . | nindent 4 }}
    app.kubernetes.io/component: controlplane
spec:
  parentRefs:
    {{- toYaml .Values.controlPlane.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.controlPlane.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.controlPlane.httpRoute.rules }}
    {{- toYaml .Values.controlPlane.httpRoute.rules | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "minato.fullname" . }}-controlplane
          port: {{ .Values.controlPlane.service.port }}
    {{- end }}
{{- end }}

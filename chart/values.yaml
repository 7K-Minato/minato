# Default values for minato.

# Override the fully qualified app name.
# Set this to avoid double suffixes when the Helm release name already contains
# the chart name (e.g. release name "minato-operator" would otherwise produce
# deployment names like "minato-operator-operator").
fullnameOverride: ""

# Namespace configuration
# Set to true if the chart should create the namespace (e.g. helm install without ArgoCD).
# Set to false when ArgoCD or another tool manages namespace creation.
namespace:
  create: false

# Operator configuration
operator:
  enabled: true
  image:
    repository: harbor.7kgroup.org/7kminato/minato-operator
    # If empty, defaults to .Chart.AppVersion. Override to pin to a specific image tag.
    tag: ""
    pullPolicy: IfNotPresent
  
  replicas: 2
  
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  leaderElection:
    enabled: true
  
  metrics:
    enabled: true
    port: 8080
    service:
      type: ClusterIP
      annotations: {}
  
  health:
    port: 8081

# Control Plane configuration
controlPlane:
  enabled: true
  image:
    repository: harbor.7kgroup.org/7kminato/minato-controlplane
    # If empty, defaults to .Chart.AppVersion. Override to pin to a specific image tag.
    tag: ""
    pullPolicy: IfNotPresent
  
  replicas: 2
  
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: minato.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  
  serviceAccount:
    create: true
    name: ""
  
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# CRDs configuration
crds:
  enabled: true
  keep: true

# RBAC configuration
rbac:
  create: true

# Monitoring configuration (Prometheus Operator)
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: ""
    labels: {}
    relabelings: []
    metricRelabelings: []
  prometheusRule:
    enabled: false
    labels: {}

# Grafana sidecar configuration
# Requires Grafana with the dashboard sidecar enabled (grafana-sc-dashboard).
grafana:
  enabled: false
  dashboards:
    enabled: true
  sidecar:
    dashboardLabel: grafana_dashboard
    dashboardLabelValue: "1"
    dashboardFolder: ""
  prometheusRule:
    enabled: true
    labels: {}

# Webhook configuration
webhook:
  # Set to true to enable validating admission webhooks.
  # When enabled, you MUST also either:
  #   a) enable certManager and provide a valid issuerRef, or
  #   b) leave certManager disabled and the chart will generate self-signed certs
  #      via an initContainer (suitable for dev/test only).
  enabled: false
  certManager:
    enabled: false
    issuerRef: {}
  # Init container image used to generate self-signed webhook certs when
  # certManager is disabled. Pinned to a digest for reproducibility.
  certgen:
    image:
      repository: alpine/openssl
      tag: "3.21.3"
      pullPolicy: IfNotPresent

# Security configuration
security:
  podSecurityStandards:
    enforce: restricted
    audit: restricted
    warn: restricted
  
  networkPolicy:
    enabled: true
    ingress: []
    egress:
      - to: []
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 6443

# Global configuration
global:
  imageRegistry: ""
  imagePullSecrets: []
  
# Testing
tests:
  enabled: true

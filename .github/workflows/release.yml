name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@db8f2c60ee802b3748b512940dde88eabd7b7e01 # v4.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: go
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod

      - name: Build release binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p dist
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi
          
          for binary in operator controlplane minato-ctl agent-generic; do
            go build -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/minato-${binary}-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}${EXT}" \
              ./cmd/${binary}
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef9c184e8ceb # v2.0.8
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  build-release-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - component: operator
            dockerfile: Dockerfile
          - component: controlplane
            dockerfile: Dockerfile.controlplane
          - component: agent-generic
            dockerfile: Dockerfile.agent-generic
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba4eb87ffd # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414a521a01325bfb0d66a1248e74ba # v3.6.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c488f3301e1560dca2e6b7f55c15157618 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push release image
        uses: docker/build-push-action@5cd11c3a7ced054e5274721b537bd82f7993d3f8 # v6.7.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@4959ce089c160fddf62f7b42464195ba1a56d382 # v3.6.0

      - name: Sign images with cosign
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            cosign sign --yes "${tag}@${{ steps.build.outputs.digest }}"
          done

  release-helm-chart:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5aab1c6a79f00f4c2a928bae1cafe5fd # v4.2.0
        with:
          version: v3.14.0

      - name: Package Helm chart
        run: |
          helm package deploy/helm/minato --destination .cr-release-packages

      - name: Upload Helm chart to release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef9c184e8ceb # v2.0.8
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: .cr-release-packages/*.tgz

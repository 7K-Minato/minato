name: Reusable Protobuf Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  proto:
    name: Check Protobuf
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install buf
        uses: bufbuild/buf-setup-action@9672a86ed9777ab2fccc503e1d177d649074d9e8 # v1.39.0
        with:
          github_token: ${{ github.token }}

      - name: Lint protobufs
        run: buf lint

      - name: Check breaking changes
        if: github.event_name == 'pull_request'
        run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main'

name: Reusable Lint Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
      go-version-file:
        required: false
        type: string
        default: go.mod
      check-generated:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint:
    name: Run Linter
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install buf
        uses: bufbuild/buf-setup-action@9672a86ed9777ab2fccc503e1d177d649074d9e8 # v1.39.0
        with:
          github_token: ${{ github.token }}

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.8
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Run linter
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make lint

      - name: Check generated code is up-to-date
        if: inputs.check-generated
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make generate manifests
          git diff --exit-code || (echo "Generated code is out of date. Run 'make generate manifests' locally." && exit 1)

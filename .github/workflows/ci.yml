name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      helm: ${{ steps.filter.outputs.helm }}
      proto: ${{ steps.filter.outputs.proto }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check for file changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
            helm:
              - 'deploy/helm/**'
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'
            docker:
              - 'Dockerfile'
              - '**/Dockerfile'
              - '.dockerignore'

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    uses: ./.github/workflows/reusable-lint.yml
    with:
      check-generated: true

  unit-tests:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    uses: ./.github/workflows/reusable-test.yml

  integration-tests:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    uses: ./.github/workflows/reusable-integration-test.yml

  security-scan:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.docker == 'true' }}
    uses: ./.github/workflows/reusable-security.yml

  helm-check:
    needs: changes
    if: ${{ needs.changes.outputs.helm == 'true' }}
    uses: ./.github/workflows/reusable-helm.yml

  proto-check:
    needs: changes
    if: ${{ needs.changes.outputs.proto == 'true' }}
    uses: ./.github/workflows/reusable-proto.yml

  build-binaries:
    needs: [lint, unit-tests]
    if: ${{ needs.changes.outputs.go == 'true' }}
    uses: ./.github/workflows/reusable-build.yml

  build-images:
    needs: [lint, unit-tests]
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.docker == 'true' }}
    uses: ./.github/workflows/reusable-build-images.yml
    with:
      push: false
    secrets: inherit

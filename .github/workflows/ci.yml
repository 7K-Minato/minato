name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      helm: ${{ steps.filter.outputs.helm }}
      proto: ${{ steps.filter.outputs.proto }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check for file changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
            helm:
              - 'deploy/helm/**'
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'
            docker:
              - 'Dockerfile'
              - '**/Dockerfile'
              - '.dockerignore'

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod

      - name: Install buf
        uses: bufbuild/buf-setup-action@9672a86ed9777ab2fccc503e1d177d649074d9e8 # v1.39.0
        with:
          github_token: ${{ github.token }}

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.8
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Run linter
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make lint

      - name: Check generated code is up-to-date
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make generate manifests
          git diff --exit-code || (echo "Generated code is out of date. Run 'make generate manifests' locally." && exit 1)

  unit-tests:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: make test

      - name: Upload coverage
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v4.5.0
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: ./cover.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: make test-integration

  e2e-tests:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod

      - name: Install kind
        uses: helm/kind-action@0025e74a8c7512023d06dc019c6171e6a0e34a93 # v1.10.0
        with:
          cluster_name: minato-e2e
          wait_for_ready: true

      - name: Run e2e tests
        run: make test-e2e

  build-binaries:
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/minato-operator-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/operator
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/minato-controlplane-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/controlplane
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/minato-ctl-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/minato-ctl
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/minato-agent-generic-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/agents/generic

      - name: Upload binaries
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 5

  build-images:
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: operator
            dockerfile: Dockerfile
            image: ghcr.io/${{ github.repository }}/operator
          - component: controlplane
            dockerfile: Dockerfile.controlplane
            image: ghcr.io/${{ github.repository }}/controlplane
          - component: agent-generic
            dockerfile: Dockerfile.agent-generic
            image: ghcr.io/${{ github.repository }}/agent-generic
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba4eb87ffd # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414a521a01325bfb0d66a1248e74ba # v3.6.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c488f3301e1560dca2e6b7f55c15157618 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push
        uses: docker/build-push-action@5cd11c3a7ced054e5274721b537bd82f7993d3f8 # v6.7.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  helm-check:
    needs: changes
    if: ${{ needs.changes.outputs.helm == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5aab1c6a79f00f4c2a928bae1cafe5fd # v4.2.0
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/minato

      - name: Template Helm chart
        run: |
          helm template minato deploy/helm/minato --namespace minato > /tmp/minato-rendered.yaml
          cat /tmp/minato-rendered.yaml | head -100

  proto-check:
    needs: changes
    if: ${{ needs.changes.outputs.proto == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install buf
        uses: bufbuild/buf-setup-action@9672a86ed9777ab2fccc503e1d177d649074d9e8 # v1.39.0
        with:
          github_token: ${{ github.token }}

      - name: Lint protobufs
        run: buf lint

      - name: Check breaking changes
        run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main'

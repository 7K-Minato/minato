name: CD

on:
  push:
    branches:
      - feat/test-release

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: go
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and publish release artifacts when release-please creates a release
  publish-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v5.6.0
        with:
          go-version-file: go.mod

      # Build all binaries for release
      - name: Build release binaries
        run: |
          mkdir -p dist
          VERSION=${{ needs.release-please.outputs.tag_name }}
          
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              # Skip windows/arm64 (not supported by Go)
              if [ "$os" = "windows" ] && [ "$arch" = "arm64" ]; then
                continue
              fi
              
              EXT=""
              if [ "$os" = "windows" ]; then
                EXT=".exe"
              fi
              
              for binary in operator controlplane minato-ctl; do
                echo "Building minato-${binary} for ${os}/${arch}..."
                GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
                  go build -ldflags="-s -w -X main.version=${VERSION}" \
                  -o "dist/minato-${binary}-${VERSION}-${os}-${arch}${EXT}" \
                  ./cmd/${binary}
              done
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  # Build and publish container images to Harbor
  publish-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - component: operator
            dockerfile: Dockerfile
            image-name: minato-operator
          - component: controlplane
            dockerfile: Dockerfile.controlplane
            image-name: minato-controlplane
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Login to Harbor
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_NAME }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Set image name
        id: image
        run: |
          REGISTRY="${HARBOR_REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          IMAGE="${REGISTRY}/${HARBOR_PROJECT}/${{ matrix.image-name }}"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.image.outputs.name }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.image.outputs.name }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/\.github/workflows/cd\.yml@.*$' \
            "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.18.0
        with:
          image: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM to image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.image.outputs.name }}
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE}@${DIGEST}"

  # Build and publish Helm chart to Harbor OCI
  publish-helm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1
        with:
          version: v3.17.3

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Package Helm chart
        id: package
        run: |
          CHART_VERSION=${{ needs.release-please.outputs.version }}
          helm package deploy/helm/minato --version "$CHART_VERSION" --destination .cr-release-packages
          CHART_NAME=$(awk '/^name:/ {print $2; exit}' deploy/helm/minato/Chart.yaml)
          PACKAGE="${CHART_NAME}-${CHART_VERSION}.tgz"
          test -f ".cr-release-packages/${PACKAGE}"
          echo "name=${CHART_NAME}" >> "$GITHUB_OUTPUT"
          echo "package=.cr-release-packages/${PACKAGE}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor (OCI)
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          REGISTRY_HOST="${HARBOR_REGISTRY#https://}"
          REGISTRY_HOST="${REGISTRY_HOST#http://}"
          echo "$HARBOR_ROBOT_TOKEN" | \
            helm registry login "$HARBOR_REGISTRY" \
              --username "$HARBOR_ROBOT_NAME" \
              --password-stdin
          echo "$HARBOR_ROBOT_TOKEN" | \
            cosign login "$REGISTRY_HOST" \
              --username "$HARBOR_ROBOT_NAME" \
              --password-stdin

      - name: Push chart to Harbor
        id: push
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          CHART_NAME: ${{ steps.package.outputs.name }}
          PACKAGE: ${{ steps.package.outputs.package }}
        run: |
          REGISTRY_HOST="${HARBOR_REGISTRY#https://}"
          REGISTRY_HOST="${REGISTRY_HOST#http://}"
          REF="oci://${REGISTRY_HOST}/${HARBOR_PROJECT}/charts"
          if ! OUTPUT=$(helm push "$PACKAGE" "$REF" 2>&1); then
            echo "$OUTPUT"
            exit 1
          fi
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          if [ -z "$DIGEST" ]; then
            echo "ERROR: could not parse digest from helm push output" >&2
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "ref=${REGISTRY_HOST}/${HARBOR_PROJECT}/charts/${CHART_NAME}" >> "$GITHUB_OUTPUT"

      - name: Sign chart with cosign (keyless)
        run: cosign sign --yes "${{ steps.push.outputs.ref }}@${{ steps.push.outputs.digest }}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/\.github/workflows/cd\.yml@.*$' \
            "${{ steps.push.outputs.ref }}@${{ steps.push.outputs.digest }}"

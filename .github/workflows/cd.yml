name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    
permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@db8f2c60ee802b3748b512940dde88eabd7b7e01 # v4.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: go
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and publish release artifacts when release-please creates a release
  publish-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod

      # Build all binaries for release
      - name: Build release binaries
        run: |
          mkdir -p dist
          VERSION=${{ needs.release-please.outputs.tag_name }}
          
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              # Skip windows/arm64 (not supported by Go)
              if [ "$os" = "windows" ] && [ "$arch" = "arm64" ]; then
                continue
              fi
              
              EXT=""
              if [ "$os" = "windows" ]; then
                EXT=".exe"
              fi
              
              for binary in operator controlplane minato-ctl agent-generic; do
                echo "Building minato-${binary} for ${os}/${arch}..."
                GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
                  go build -ldflags="-s -w -X main.version=${VERSION}" \
                  -o "dist/minato-${binary}-${VERSION}-${os}-${arch}${EXT}" \
                  ./cmd/${binary}
              done
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef9c184e8ceb # v2.0.8
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  # Build and publish container images for releases
  publish-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/reusable-build-images.yml
    with:
      push: true
    secrets: inherit

  # Build and publish Helm chart
  publish-helm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5aab1c6a79f00f4c2a928bae1cafe5fd # v4.2.0
        with:
          version: v3.14.0

      - name: Package Helm chart
        run: |
          helm package deploy/helm/minato --destination .cr-release-packages

      - name: Upload Helm chart to release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef9c184e8ceb # v2.0.8
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: .cr-release-packages/*.tgz

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c488f3301e1560dca2e6b7f55c15157618 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to OCI registry
        run: |
          helm push .cr-release-packages/*.tgz oci://ghcr.io/${{ github.repository }}/charts

name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: go
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and publish release artifacts when release-please creates a release
  publish-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      # Build all binaries for release
      - name: Build release binaries
        run: |
          mkdir -p dist
          VERSION=${{ needs.release-please.outputs.tag_name }}
          
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              # Skip windows/arm64 (not supported by Go)
              if [ "$os" = "windows" ] && [ "$arch" = "arm64" ]; then
                continue
              fi
              
              EXT=""
              if [ "$os" = "windows" ]; then
                EXT=".exe"
              fi
              
              for binary in operator controlplane minato-ctl agent-generic; do
                echo "Building minato-${binary} for ${os}/${arch}..."
                GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
                  go build -ldflags="-s -w -X main.version=${VERSION}" \
                  -o "dist/minato-${binary}-${VERSION}-${os}-${arch}${EXT}" \
                  ./cmd/${binary}
              done
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  # Build and publish container images for releases
  publish-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/reusable-build-images.yml
    with:
      push: true
    secrets: inherit

  # Build and publish Helm chart
  publish-helm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.14.0

      - name: Package Helm chart
        run: |
          helm package deploy/helm/minato --destination .cr-release-packages

      - name: Upload Helm chart to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: .cr-release-packages/*.tgz

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to OCI registry
        run: |
          helm push .cr-release-packages/*.tgz oci://ghcr.io/${{ github.repository }}/charts

name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
      go-version-file:
        required: false
        type: string
        default: go.mod

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Binaries
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION=${{ github.ref_name || 'dev' }}
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-operator-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/operator
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-controlplane-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/controlplane
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-ctl-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/minato-ctl
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-agent-generic-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/agents/generic

      - name: Upload binaries
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 5

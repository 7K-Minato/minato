name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
      go-version-file:
        required: false
        type: string
        default: go.mod

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Binaries
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION=${{ github.ref_name || 'dev' }}
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-operator-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/operator
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-controlplane-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/controlplane
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-ctl-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/minato-ctl

      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 5

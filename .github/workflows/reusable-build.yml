name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
      go-version-file:
        required: false
        type: string
        default: go.mod

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Binaries
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION=${{ github.ref_name || 'dev' }}
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-operator-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/operator
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-controlplane-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/controlplane
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/minato-ctl-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/minato-ctl

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 5

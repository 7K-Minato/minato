name: Reusable Helm Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  helm:
    name: Check Helm Charts
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/minato

      - name: Template Helm chart
        run: |
          helm template minato deploy/helm/minato --namespace minato > /tmp/minato-rendered.yaml
          cat /tmp/minato-rendered.yaml | head -100

name: Reusable Helm Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  helm:
    name: Check Helm Charts
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5aab1c6a79f00f4c2a928bae1cafe5fd # v4.2.0
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/minato

      - name: Template Helm chart
        run: |
          helm template minato deploy/helm/minato --namespace minato > /tmp/minato-rendered.yaml
          cat /tmp/minato-rendered.yaml | head -100

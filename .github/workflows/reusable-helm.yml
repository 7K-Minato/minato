name: Reusable Helm Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  helm:
    name: Check Helm Charts
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/minato

      - name: Template Helm chart
        run: |
          helm template minato deploy/helm/minato --namespace minato > /tmp/minato-rendered.yaml
          cat /tmp/minato-rendered.yaml | head -100

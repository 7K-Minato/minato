apiVersion: operator.minato.io/v1
kind: GameProfile
metadata:
  labels:
    app.kubernetes.io/name: minato
    app.kubernetes.io/managed-by: kustomize
  name: gameprofile-sample
spec:
  displayName: "Minecraft (Sample)"
  image: "example.com/minato/game:latest"
  ports:
    - name: game
      containerPort: 25565
      protocol: TCP
  environment:
    - key: EULA
      default: "true"
      required: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  storage:
    mountPath: /data
    sizeDefault: 10Gi
  agent:
    image: "example.com/minato/agent-minecraft:latest"
    version: "0.1.0"

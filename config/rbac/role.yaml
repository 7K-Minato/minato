---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monitoring.coreos.com
  resources:
  - servicemonitors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - operator.minato.io
  resources:
  - actionexecutions
  - gameserverfleets
  - gameservers
  - gamesnapshots
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - operator.minato.io
  resources:
  - actionexecutions/finalizers
  - gameserverfleets/finalizers
  - gameservers/finalizers
  - gamesnapshots/finalizers
  verbs:
  - update
- apiGroups:
  - operator.minato.io
  resources:
  - actionexecutions/status
  - gameserverfleets/status
  - gameservers/status
  - gamesnapshots/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - operator.minato.io
  resources:
  - gameprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - snapshot.storage.k8s.io
  resources:
  - volumesnapshots
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

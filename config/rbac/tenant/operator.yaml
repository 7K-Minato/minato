apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: minato:tenant-operator
  labels:
    app.kubernetes.io/name: minato
    minato.io/role: tenant-operator
rules:
# Inherits viewer permissions
- apiGroups: ["operator.minato.io"]
  resources: ["gameprofiles"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["operator.minato.io"]
  resources: ["gameservers", "gameserverfleets", "actionexecutions", "gamesnapshots"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch"]
# Operator-specific permissions
- apiGroups: ["operator.minato.io"]
  resources: ["gameservers"]
  verbs: ["create", "update", "patch", "delete"]
- apiGroups: ["operator.minato.io"]
  resources: ["actionexecutions"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]

---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-operator-minato-io-v1-gameprofile
  failurePolicy: Fail
  name: vgameprofile.kb.io
  rules:
  - apiGroups:
    - operator.minato.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - gameprofiles
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-operator-minato-io-v1-gameserver
  failurePolicy: Fail
  name: vgameserver.kb.io
  rules:
  - apiGroups:
    - operator.minato.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - gameservers
  sideEffects: None
